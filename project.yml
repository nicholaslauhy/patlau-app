name: PatLau
options:
  bundleIdPrefix: com.patlau
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  PatLau:
    type: application
    platform: iOS
    sources:
      - path: PatLau
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patlau.app
        PRODUCT_NAME: PatLau
        INFOPLIST_FILE: PatLau/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      testTargets:
        - PatLauTests
        - PatLauUITests
  PatLauTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: PatLauTests
    dependencies:
      - target: PatLau
  PatLauUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: PatLauUITests
    dependencies:
      - target: PatLau
